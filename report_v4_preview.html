<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>گزارش هفتگی تیم فنی</title>
<style>
:root{--bg:#0d111a;--card:#1c2237;--text:#fff;--muted:#94a3b8;--blue:#38bdf8;--border:rgba(255,255,255,0.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);padding:20px}
.container{max-width:1150px;margin:0 auto}

/* Header */
.header{background:linear-gradient(135deg,#1c2237,#162032);border-radius:20px;padding:28px 32px;margin-bottom:20px;border:1px solid rgba(56,189,248,0.2);display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.header h1{font-size:1.5rem;color:var(--blue)}
.header .week{color:var(--muted);font-size:0.88rem;margin-top:5px}
.header-badge{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:var(--blue);padding:6px 16px;border-radius:20px;font-size:0.83rem}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:14px;padding:18px;text-align:center;border:1px solid var(--border);transition:transform 0.2s}
.kpi:hover{transform:translateY(-2px)}
.kpi .num{font-size:2.2rem;font-weight:900;line-height:1}
.kpi .label{color:var(--muted);font-size:0.8rem;margin-top:6px}
.kpi.green{border-bottom:3px solid #34d399}.kpi.green .num{color:#34d399}
.kpi.orange{border-bottom:3px solid #fbbf24}.kpi.orange .num{color:#fbbf24}
.kpi.red{border-bottom:3px solid #f87171}.kpi.red .num{color:#f87171}
.kpi.blue{border-bottom:3px solid var(--blue)}.kpi.blue .num{color:var(--blue)}
.kpi.purple{border-bottom:3px solid #a78bfa}.kpi.purple .num{color:#a78bfa}

/* Section title */
.section-title{font-size:0.78rem;font-weight:bold;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Chart */
.chart-card{background:var(--card);border-radius:16px;padding:22px;margin-bottom:20px;border:1px solid var(--border)}
.bar-wrapper{margin-bottom:14px}
.bar-info{display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:6px}
.bar-container{height:10px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:10px}

/* Two-col cards */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.bug-card{background:var(--card);border-radius:16px;padding:22px;border:1px solid var(--border)}
.donut-wrap{display:flex;align-items:center;gap:24px}
.donut{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.donut::before{content:'';position:absolute;width:64px;height:64px;border-radius:50%;background:var(--card)}
.donut-num{position:relative;z-index:1;font-size:1.1rem;font-weight:900;color:#f87171}
.bug-stats{flex:1}
.bug-stat-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.85rem}
.bug-stat-row:last-child{border-bottom:none}

/* Workload */
.workload-bar-wrap{margin-bottom:10px}
.workload-bar-info{display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:4px}
.workload-bar-bg{height:8px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.workload-bar-fill{height:100%;border-radius:10px}

/* Gantt */
.gantt-card{background:var(--card);border-radius:16px;padding:22px;margin-bottom:20px;border:1px solid var(--border)}
.gantt-controls{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.gantt-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:20px;font-size:0.78rem;cursor:pointer;transition:all 0.2s}
.gantt-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.gantt-legend{display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap;padding:10px 14px;background:rgba(255,255,255,0.03);border-radius:10px}
.gantt-legend-item{display:flex;align-items:center;gap:7px;font-size:0.78rem;color:var(--muted)}
.gantt-legend-dot{width:14px;height:10px;border-radius:3px;flex-shrink:0}
.gantt-axis{position:relative;height:28px;margin-right:200px;margin-bottom:4px;border-bottom:1px solid var(--border)}
.gt-axis-label{position:absolute;font-size:0.68rem;color:var(--muted);transform:translateX(50%);bottom:4px;white-space:nowrap}
.gantt-proj-block{margin-bottom:10px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.gantt-proj-toggle{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;background:rgba(255,255,255,0.03);user-select:none}
.gantt-proj-toggle:hover{background:rgba(255,255,255,0.05)}
.gt-toggle-icon{color:var(--muted);font-size:0.8rem;transition:transform 0.3s}
.gantt-proj-body{overflow-x:auto;background:rgba(0,0,0,0.15)}
.gt-inner{min-width:600px;padding:8px 0}
.gt-row{display:flex;align-items:center;padding:3px 12px;min-height:34px}
.gt-row:hover{background:rgba(255,255,255,0.02)}
.gt-row.overdue-row{background:rgba(248,113,113,0.04)}
.gt-label{width:200px;flex-shrink:0;padding-left:8px}
.gt-label-name{font-size:0.75rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gt-label-meta{font-size:0.67rem;color:var(--muted);margin-top:2px}
.gt-track{flex:1;height:22px;background:rgba(255,255,255,0.03);border-radius:6px;position:relative;margin:0 4px}
.gt-bar{position:absolute;height:100%;border-radius:6px;cursor:pointer;display:flex;align-items:center;overflow:hidden;transition:filter 0.2s;min-width:6px}
.gt-bar:hover{filter:brightness(1.3);z-index:10}
.gt-bar-dot{position:absolute;width:10px;height:10px;border-radius:50%;top:50%;transform:translateY(-50%)}
.gt-bar-label{font-size:0.65rem;color:rgba(0,0,0,0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 6px;font-weight:bold}
.gt-deadline-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(248,113,113,0.5);pointer-events:none}

/* Search bar */
.search-bar{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#fff;padding:8px 14px;border-radius:10px;font-size:0.85rem;margin-bottom:14px;outline:none;font-family:inherit}
.search-bar:focus{border-color:rgba(56,189,248,0.4);background:rgba(255,255,255,0.07)}
.search-bar::placeholder{color:var(--muted)}

/* Team cards */
.team-card{background:var(--card);border-radius:14px;margin-bottom:12px;overflow:hidden;border:1px solid var(--border)}
.team-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;user-select:none}
.team-header:hover{background:rgba(255,255,255,0.02)}
.team-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.team-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.team-badge{background:rgba(255,255,255,0.07);color:var(--muted);padding:2px 10px;border-radius:20px;font-size:0.75rem}
.team-stats{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.stat-pill{padding:3px 10px;border-radius:20px;font-size:0.75rem}
.stat-pill.green{background:rgba(52,211,153,0.1);color:#34d399}
.stat-pill.orange{background:rgba(251,191,36,0.1);color:#fbbf24}
.stat-pill.red{background:rgba(248,113,113,0.1);color:#f87171}
.stat-pill.blue{background:rgba(56,189,248,0.1);color:var(--blue)}
.toggle-icon{color:var(--muted);font-size:0.75rem;transition:transform 0.3s}
.bar-mini{height:3px;background:rgba(255,255,255,0.04)}
.team-body{padding:0 18px 18px}

/* Table */
table{width:100%;border-collapse:collapse;font-size:0.8rem;margin-top:12px}
th{color:var(--muted);font-weight:normal;padding:8px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
td{padding:8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.015)}
tr.overdue-task td{background:rgba(248,113,113,0.04)}
tr.overdue-task td:first-child::before{content:'⚠ ';color:#f87171}
.task-hidden{display:none}

.footer{text-align:center;color:var(--muted);font-size:0.75rem;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>📊 گزارش هفتگی تیم فنی</h1>
      <div class="week">📅 بازه زمانی: <strong style="color:#fff" id="week-range">—</strong></div>
    </div>
    <div class="header-badge" id="task-count">🔢 — تسک</div>
  </div>

  <div class="kpi-row" id="kpi-row"></div>

  <div class="section-title">📊 ساعت کار به تفکیک پروژه</div>
  <div class="chart-card" id="chart-hours"></div>

  <div class="two-col" id="two-col"></div>

  <div class="section-title">📅 نمودار گانت — به تفکیک پروژه</div>
  <div class="gantt-card" id="gantt-card"></div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="section-title" style="margin-bottom:0;flex:1">📁 تسک‌ها به تفکیک پروژه</div>
    <div style="display:flex;gap:8px">
      <button class="gantt-btn" onclick="expandAll()">باز کردن همه</button>
      <button class="gantt-btn" onclick="collapseAll()">بستن همه</button>
    </div>
  </div>

  <input class="search-bar" id="global-search" placeholder="🔍 جستجو بر اساس وظیفه، مسئول یا تیم..." oninput="filterTasks(this.value)">

  <div id="team-cards"></div>

  <div class="footer" id="footer">گزارش تولید شده توسط n8n automation</div>
</div>

<script>
// ─── Helpers ────────────────────────────────────────────────────────────────
const PALETTE = ['#38bdf8','#a78bfa','#34d399','#fb923c','#f472b6','#fbbf24','#60a5fa','#4ade80'];
let projColorMap = {};

function getColor(proj) {
  return projColorMap[proj] || '#94a3b8';
}

function isDone(s)      { return /انجام\s*شده|done|complete/i.test(s||''); }
function isProgress(s)  { return /درحال|in.progress|doing/i.test(s||''); }
function isStopped(s)   { return /متوقف|stopped|blocked|cancel/i.test(s||''); }
function isBug(l)       { return /bug/i.test(l||''); }

function parseDate(v) {
  if (!v || v === '-') return null;
  const m = String(v).trim().match(/(\d{3,4})\D(\d{1,2})\D(\d{1,2})/);
  if (!m) return null;
  return { y: +m[1], mo: +m[2], d: +m[3], str: String(v).trim() };
}

function dateNum(d) {
  if (!d) return 0;
  const ml = [31,31,31,31,31,31,30,30,30,30,30,29];
  let days = (d.y - 1300) * 365 + Math.floor((d.y-1300)/4);
  for (let i = 1; i < d.mo; i++) days += ml[i-1] || 30;
  return days + d.d;
}

function shortDate(str) {
  const p = str.split('/');
  return p.length >= 3 ? `${p[1]}/${p[2]}` : str;
}

function pick(raw) {
  const map = {
    project:      ['project','پروژه'],
    task:         ['task','وظیفه'],
    assignee:     ['assignee','مسئول'],
    team:         ['team','تیم مسئول'],
    startAt:      ['startAt','تاریخ شروع'],
    dueAt:        ['dueAt','مهلت انجام'],
    endAt:        ['endAt','تاریخ پایان'],
    status:       ['status','وضعیت','وضعییت'],
    estimateH:    ['estimateHours','برآورد اولیه (ساعت)'],
    actualH:      ['actualHours','زمان پیاده\u200cسازی (ساعت)','زمان پیاده‌سازی (ساعت)'],
    label:        ['label','برچسب'],
    storyPoint:   ['storyPoint','story point'],
  };
  const out = {};
  for (const [key, sources] of Object.entries(map)) {
    for (const s of sources) {
      if (raw[s] != null) { out[key] = raw[s]; break; }
    }
  }
  out.project   = out.project   || 'بدون پروژه';
  out.task      = out.task      || '-';
  out.assignee  = out.assignee  || '-';
  out.team      = out.team      || '-';
  out.startAt   = out.startAt   || '-';
  out.dueAt     = out.dueAt     || '-';
  out.endAt     = out.endAt     || '-';
  out.status    = out.status    || '-';
  out.label     = out.label     || '-';
  out.actualH   = out.actualH   != null ? +out.actualH : null;
  out.estimateH = out.estimateH != null ? +out.estimateH : null;
  out.storyPoint= out.storyPoint!= null ? +out.storyPoint : null;
  out.hours     = out.actualH   ?? out.estimateH ?? 0;
  return out;
}

// ─── Main render ─────────────────────────────────────────────────────────────
function render(rawTasks) {
  const tasks = rawTasks.map(pick);
  const total = tasks.length;

  // Project color map
  const projNames = [...new Set(tasks.map(t => t.project))];
  projNames.forEach((p,i) => projColorMap[p] = PALETTE[i % PALETTE.length]);

  // Stats
  const done      = tasks.filter(t => isDone(t.status));
  const inProg    = tasks.filter(t => isProgress(t.status));
  const stopped   = tasks.filter(t => isStopped(t.status));
  const bugs      = tasks.filter(t => isBug(t.label));
  const totalH    = tasks.reduce((s,t) => s + t.hours, 0);
  const bugPct    = total ? (bugs.length/total*100).toFixed(1) : '0.0';
  const today     = dateNum(parseDate(new Date().toLocaleDateString('fa-IR').replace(/\//g,'/')));

  // Overdue = deadline passed + not done
  function isOverdue(t) {
    const due = dateNum(parseDate(t.dueAt));
    return due && today > due && !isDone(t.status);
  }

  // Week range
  const allDates = tasks.flatMap(t => [t.startAt, t.endAt, t.dueAt])
    .map(parseDate).filter(Boolean).map(d => d.str).sort();
  const weekRange = allDates.length ? `${allDates[0]} تا ${allDates[allDates.length-1]}` : '—';

  document.getElementById('week-range').textContent = weekRange;
  document.getElementById('task-count').textContent = `🔢 ${total} تسک در این اسپرینت`;
  document.getElementById('footer').textContent = `گزارش تولید شده توسط n8n automation — ${weekRange}`;

  // ── KPIs ──
  document.getElementById('kpi-row').innerHTML = [
    {n: done.length,      label:'✅ انجام شده',     cls:'green'},
    {n: inProg.length,    label:'🔄 در حال انجام',  cls:'orange'},
    {n: stopped.length,   label:'🚫 متوقف شده',     cls:'red'},
    {n: totalH.toFixed(1).replace(/\.0$/,'')+'h', label:'⏱ کل ساعت کار', cls:'blue'},
    {n: bugPct+'%',       label:'🐛 نسبت باگ',      cls:'purple'},
  ].map(k => `<div class="kpi ${k.cls}"><div class="num">${k.n}</div><div class="label">${k.label}</div></div>`).join('');

  // ── Hours chart ──
  const byProj = {};
  tasks.forEach(t => { byProj[t.project] = (byProj[t.project]||0) + t.hours; });
  const projSorted = Object.entries(byProj).sort((a,b) => b[1]-a[1]);
  const maxH = projSorted[0]?.[1] || 1;
  document.getElementById('chart-hours').innerHTML = projSorted.map(([proj,h]) => {
    const c = getColor(proj);
    return `<div class="bar-wrapper">
      <div class="bar-info"><span style="color:#fff;font-weight:500">${proj}</span><span style="color:${c};font-weight:bold">${h.toFixed(1).replace(/\.0$/,'')}h</span></div>
      <div class="bar-container"><div class="bar-fill" style="width:${h/maxH*100}%;background:linear-gradient(90deg,${c}99,${c})"></div></div>
    </div>`;
  }).join('');

  // ── Bug analysis + Workload ──
  const labelCounts = {};
  tasks.forEach(t => { const l = t.label||'بدون برچسب'; labelCounts[l]=(labelCounts[l]||0)+1; });
  const labelsHtml = Object.entries(labelCounts).sort((a,b)=>b[1]-a[1])
    .map(([l,c]) => `<div class="bug-stat-row"><span style="color:var(--muted)">${l}</span><span style="color:#fff;font-weight:bold">${c}</span></div>`).join('');

  // Workload per person
  const workload = {};
  tasks.forEach(t => { workload[t.assignee] = (workload[t.assignee]||0) + t.hours; });
  const workSorted = Object.entries(workload).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxW = workSorted[0]?.[1] || 1;
  const workHtml = workSorted.map(([person,h]) => `
    <div class="workload-bar-wrap">
      <div class="workload-bar-info">
        <span style="color:#fff;font-size:0.82rem">${person}</span>
        <span style="color:var(--blue);font-weight:bold;font-size:0.82rem">${h.toFixed(1).replace(/\.0$/,'')}h</span>
      </div>
      <div class="workload-bar-bg"><div class="workload-bar-fill" style="width:${h/maxW*100}%;background:linear-gradient(90deg,#38bdf899,#38bdf8)"></div></div>
    </div>`).join('');

  const bugDone = bugs.filter(t => isDone(t.status)).length;
  const bugOpen = bugs.length - bugDone;
  const donutBg = `conic-gradient(#f87171 0% ${bugPct}%,rgba(248,113,113,0.1) ${bugPct}% 100%)`;

  document.getElementById('two-col').innerHTML = `
    <div class="bug-card">
      <div class="section-title">🐛 آنالیز باگ‌ها</div>
      <div class="donut-wrap">
        <div class="donut" style="background:${donutBg}"><span class="donut-num">${bugPct}%</span></div>
        <div class="bug-stats">
          <div class="bug-stat-row"><span>کل باگ‌ها</span><span style="color:#f87171;font-weight:bold">${bugs.length}</span></div>
          <div class="bug-stat-row"><span>کل تسک‌ها</span><span style="color:#fff">${total}</span></div>
          <div class="bug-stat-row"><span>حل‌شده</span><span style="color:#34d399">${bugDone}</span></div>
          <div class="bug-stat-row"><span>باز</span><span style="color:#fbbf24">${bugOpen}</span></div>
        </div>
      </div>
      <div style="margin-top:16px">
        <div class="section-title" style="margin-bottom:8px">🏷 توزیع برچسب‌ها</div>
        ${labelsHtml}
      </div>
    </div>
    <div class="bug-card">
      <div class="section-title">👤 حجم کار هر نفر (ساعت)</div>
      ${workHtml}
    </div>`;

  // ── Gantt ──
  const ganttTasks = tasks.filter(t => parseDate(t.startAt) && parseDate(t.endAt));
  const allNums = ganttTasks.flatMap(t => [dateNum(parseDate(t.startAt)), dateNum(parseDate(t.endAt)), dateNum(parseDate(t.dueAt))].filter(Boolean));
  const minN = Math.min(...allNums);
  const maxN = Math.max(...allNums);
  const span = Math.max(maxN - minN, 1);

  // Unique dates for axis — max 8 labels
  const uniqueDates = [...new Set(ganttTasks.flatMap(t=>[t.startAt,t.endAt,t.dueAt]).map(parseDate).filter(Boolean).map(d=>d.str))].sort();
  const step = Math.max(1, Math.floor(uniqueDates.length / 8));
  const axisLabels = uniqueDates.filter((_,i)=>i%step===0).map(d => {
    const n = dateNum(parseDate(d));
    const pct = (n-minN)/span*100;
    return `<div class="gt-axis-label" style="left:${pct}%">${shortDate(d)}</div>`;
  }).join('');

  // Group gantt by project (same order as projSorted)
  const ganttByProj = {};
  ganttTasks.forEach(t => { (ganttByProj[t.project]=ganttByProj[t.project]||[]).push(t); });

  const ganttSections = projSorted.map(([proj],pidx) => {
    if (!ganttByProj[proj]) return '';
    const color = getColor(proj);
    const ptasks = ganttByProj[proj].sort((a,b)=>(parseDate(a.startAt)?.str||'').localeCompare(parseDate(b.startAt)?.str||''));

    const rows = ptasks.map(t => {
      const s = dateNum(parseDate(t.startAt));
      const e = dateNum(parseDate(t.endAt));
      const due = dateNum(parseDate(t.dueAt));
      const left = (s - minN) / span * 100;
      const rawW = (e - s) / span * 100;
      const isDot = rawW < 1.5;
      const width = isDot ? 0 : Math.max(rawW, 1.5);

      let barColor;
      if (isStopped(t.status)) barColor = '#fbbf24';
      else if (isDone(t.status)) barColor = (due && e > due) ? '#f87171' : '#34d399';
      else barColor = '#475569';

      const overdue = isOverdue(t);
      const label = t.task.length > 28 ? t.task.slice(0,28)+'…' : t.task;

      const deadlineLine = due ? `<div class="gt-deadline-line" style="left:${(due-minN)/span*100}%"></div>` : '';

      return `<div class="gt-row${overdue?' overdue-row':''}">
        <div class="gt-label" title="${t.task}">
          <div class="gt-label-name">${label}${overdue?'<span style="color:#f87171;margin-right:4px"> ⚠</span>':''}</div>

        </div>
        <div class="gt-track">
          ${deadlineLine}
          ${isDot
            ? `<div class="gt-bar-dot" style="left:${left}%;background:${barColor}" title="${t.task}&#10;${t.startAt}&#10;مهلت: ${t.dueAt}&#10;${t.status}"></div>`
            : `<div class="gt-bar" style="left:${left}%;width:${width}%;background:${barColor}" title="${t.task}&#10;${t.startAt} → ${t.endAt}&#10;مهلت: ${t.dueAt}&#10;${t.status}">
                <span class="gt-bar-label">${label}</span>
               </div>`
          }
        </div>
      </div>`;
    }).join('');

    return `<div class="gantt-proj-block" data-gantt-block="${pidx}">
      <div class="gantt-proj-toggle" onclick="toggleGantt(${pidx})" style="border-right:4px solid ${color}">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="color:${color};font-weight:bold">${proj}</span>
          <span style="background:rgba(255,255,255,0.07);color:#94a3b8;padding:2px 10px;border-radius:20px;font-size:0.75rem">${ptasks.length} تسک</span>
        </div>
        <span class="gt-toggle-icon" id="gicon-${pidx}">▼</span>
      </div>
      <div class="gantt-proj-body" id="gbody-${pidx}" style="display:none">
        <div class="gt-inner">${rows}</div>
      </div>
    </div>`;

  document.getElementById('gantt-card').innerHTML = `
    <div class="gantt-controls">
      <button class="gantt-btn" onclick="expandAllGantt()">باز کردن همه</button>
      <button class="gantt-btn" onclick="collapseAllGantt()">بستن همه</button>
    </div>
    <div class="gantt-legend">
      <div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#34d399"></div>به موقع تحویل داده شد</div>
      <div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#f87171"></div>دیرتر از مهلت</div>
      <div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#fbbf24"></div>متوقف شده</div>
      <div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#475569"></div>در حال انجام</div>
      <div class="gantt-legend-item" style="margin-right:8px"><div style="width:2px;height:14px;background:rgba(248,113,113,0.5);border-radius:1px"></div>مهلت انجام</div>
    </div>
    <div class="gantt-axis" style="margin-right:200px">${axisLabels}</div>
    ${ganttSections}`;

  // ── Task sections ──
  const projGroups = {};
  tasks.forEach(t => { (projGroups[t.project]=projGroups[t.project]||[]).push(t); });

  const cards = projSorted.map(([proj], pidx) => {
    const ptasks = (projGroups[proj]||[]).sort((a,b)=>b.hours-a.hours);
    const color = getColor(proj);
    const ph = ptasks.reduce((s,t)=>s+t.hours,0);
    const pdone = ptasks.filter(t=>isDone(t.status)).length;
    const pprog = ptasks.filter(t=>isProgress(t.status)).length;
    const pstop = ptasks.filter(t=>isStopped(t.status)).length;
    const pbug  = ptasks.filter(t=>isBug(t.label)).length;
    const povdue= ptasks.filter(t=>isOverdue(t)).length;

    const teamColors = {'تیم بک اند':'#38bdf8','تیم فلاتر':'#a78bfa','تیم فرانت':'#34d399','تیم UI-UX':'#f472b6','devOps':'#fb923c'};
    const tc = t => teamColors[t] || '#94a3b8';

    const rows = ptasks.map(t => {
      const sc = isDone(t.status)?'#34d399':isStopped(t.status)?'#f87171':'#fbbf24';
      const sb = isDone(t.status)?'rgba(52,211,153,0.1)':isStopped(t.status)?'rgba(248,113,113,0.1)':'rgba(251,191,36,0.1)';
      const overdue = isOverdue(t);
      return `<tr class="${overdue?'overdue-task':''}" data-task="${t.task.toLowerCase()} ${t.assignee.toLowerCase()} ${t.team.toLowerCase()}">
        <td>${t.task}${isBug(t.label)?'<span style="background:rgba(248,113,113,0.15);color:#f87171;padding:2px 7px;border-radius:10px;font-size:0.72rem;margin-right:4px">🐛</span>':''}${overdue?'<span style="color:#f87171;font-size:0.72rem;margin-right:4px">⚠ تأخیر</span>':''}</td>
        <td><span style="color:${tc(t.team)}">${t.team}</span></td>
        <td>${t.assignee}</td>
        <td>${t.startAt}</td>
        <td>${t.endAt}</td>
        <td>${t.dueAt}</td>
        <td>${t.hours>0?t.hours.toFixed(1).replace(/\.0$/,''):'-'}</td>
        <td><span style="background:${sb};color:${sc};padding:3px 10px;border-radius:20px;font-size:0.75rem">${t.status}</span></td>
      </tr>`;
    }).join('');

    return `<div class="team-card" data-proj-card="${pidx}" style="border-right:4px solid ${color}">
      <div class="team-header" onclick="toggle(${pidx})">
        <div class="team-title">
          <span class="team-dot" style="background:${color}"></span>
          <strong style="font-size:1rem">${proj}</strong>
          <span class="team-badge">${ptasks.length} تسک</span>
          ${pbug?`<span class="stat-pill" style="background:rgba(248,113,113,0.1);color:#f87171">${pbug} 🐛</span>`:''}
          ${povdue?`<span class="stat-pill" style="background:rgba(248,113,113,0.1);color:#f87171">${povdue} ⚠ تأخیر</span>`:''}
        </div>
        <div class="team-stats">
          <span class="stat-pill green">${pdone} ✅</span>
          <span class="stat-pill orange">${pprog} 🔄</span>
          ${pstop?`<span class="stat-pill red">${pstop} 🚫</span>`:''}
          <span class="stat-pill blue">${ph.toFixed(1).replace(/\.0$/,'')}h</span>
          <span class="toggle-icon" id="icon-${pidx}">▼</span>
        </div>
      </div>
      <div class="bar-mini"><div style="height:100%;width:${Math.min(100,ph/maxH*100)}%;background:${color}"></div></div>
      <div class="team-body" id="body-${pidx}" style="display:none">
        <table id="table-${pidx}">
          <thead><tr><th>وظیفه</th><th>تیم</th><th>مسئول</th><th>شروع</th><th>پایان</th><th>مهلت</th><th>ساعت</th><th>وضعیت</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  document.getElementById('team-cards').innerHTML = cards;
}

// ─── Controls ────────────────────────────────────────────────────────────────
function toggle(idx) {
  const b = document.getElementById('body-'+idx);
  const i = document.getElementById('icon-'+idx);
  if (!b) return;
  const open = b.style.display === 'none';
  b.style.display = open ? 'block' : 'none';
  i.style.transform = open ? 'rotate(180deg)' : 'rotate(0)';
}
function expandAll() {
  document.querySelectorAll('[id^="body-"]').forEach(b => { b.style.display='block'; });
  document.querySelectorAll('[id^="icon-"]').forEach(i => { i.style.transform='rotate(180deg)'; });
}
function collapseAll() {
  document.querySelectorAll('[id^="body-"]').forEach(b => { b.style.display='none'; });
  document.querySelectorAll('[id^="icon-"]').forEach(i => { i.style.transform='rotate(0)'; });
}
function toggleGantt(idx) {
  const b = document.getElementById('gbody-'+idx);
  const i = document.getElementById('gicon-'+idx);
  if (!b) return;
  const open = b.style.display === 'none';
  b.style.display = open ? 'block' : 'none';
  i.style.transform = open ? 'rotate(180deg)' : 'rotate(0)';
}
function expandAllGantt() {
  document.querySelectorAll('[id^="gbody-"]').forEach(b => { b.style.display='block'; });
  document.querySelectorAll('[id^="gicon-"]').forEach(i => { i.style.transform='rotate(180deg)'; });
}
function collapseAllGantt() {
  document.querySelectorAll('[id^="gbody-"]').forEach(b => { b.style.display='none'; });
  document.querySelectorAll('[id^="gicon-"]').forEach(i => { i.style.transform='rotate(0)'; });
}

function filterTasks(q) {
  const query = q.toLowerCase().trim();
  document.querySelectorAll('[data-proj-card]').forEach(card => {
    const idx = card.getAttribute('data-proj-card');
    const tbody = card.querySelector('tbody');
    if (!tbody) return;
    let anyVisible = false;
    tbody.querySelectorAll('tr[data-task]').forEach(row => {
      const match = !query || row.getAttribute('data-task').includes(query);
      row.style.display = match ? '' : 'none';
      if (match) anyVisible = true;
    });
    // Auto-expand if search has results
    if (query && anyVisible) {
      const body = document.getElementById('body-'+idx);
      const icon = document.getElementById('icon-'+idx);
      if (body) { body.style.display='block'; icon.style.transform='rotate(180deg)'; }
    }
    card.style.display = (!query || anyVisible) ? '' : 'none';
  });
}
