<html lang="fa" dir="rtl">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>گزارش هفتگی تیم فنی</title>
<style>
:root{--bg:#0d111a;--card:#1c2237;--text:#fff;--muted:#94a3b8;--blue:#38bdf8;--border:rgba(255,255,255,0.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);padding:20px}
.container{max-width:1150px;margin:0 auto}
.header{background:linear-gradient(135deg,#1c2237,#162032);border-radius:20px;padding:28px 32px;margin-bottom:20px;border:1px solid rgba(56,189,248,0.2);display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.header h1{font-size:1.5rem;color:var(--blue)}
.header .week{color:var(--muted);font-size:0.88rem;margin-top:5px}
.header-badge{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:var(--blue);padding:6px 16px;border-radius:20px;font-size:0.83rem}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:14px;padding:18px;text-align:center;border:1px solid var(--border);transition:transform 0.2s}
.kpi:hover{transform:translateY(-2px)}
.kpi .num{font-size:2.2rem;font-weight:900;line-height:1}
.kpi .label{color:var(--muted);font-size:0.8rem;margin-top:6px}
.kpi.green{border-bottom:3px solid #34d399}.kpi.green .num{color:#34d399}
.kpi.orange{border-bottom:3px solid #fbbf24}.kpi.orange .num{color:#fbbf24}
.kpi.red{border-bottom:3px solid #f87171}.kpi.red .num{color:#f87171}
.kpi.blue{border-bottom:3px solid var(--blue)}.kpi.blue .num{color:var(--blue)}
.kpi.purple{border-bottom:3px solid #a78bfa}.kpi.purple .num{color:#a78bfa}
.section-title{font-size:0.78rem;font-weight:bold;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.chart-card{background:var(--card);border-radius:16px;padding:22px;margin-bottom:20px;border:1px solid var(--border)}
.bar-wrapper{margin-bottom:14px}
.bar-info{display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:6px}
.bar-container{height:10px;background:rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:10px}
.bug-section{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.bug-card{background:var(--card);border-radius:16px;padding:22px;border:1px solid var(--border)}
.donut-wrap{display:flex;align-items:center;gap:24px}
.donut{width:90px;height:90px;border-radius:50%;background:conic-gradient(#f87171 0% 20%,rgba(248,113,113,0.1) 20% 100%);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.donut::before{content:'';position:absolute;width:64px;height:64px;border-radius:50%;background:var(--card)}
.donut-num{position:relative;z-index:1;font-size:1.1rem;font-weight:900;color:#f87171}
.bug-stats{flex:1}
.bug-stat-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.85rem}
.bug-stat-row:last-child{border-bottom:none}
.gantt-card{background:var(--card);border-radius:16px;padding:22px;margin-bottom:20px;border:1px solid var(--border)}
.gantt-legend{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap;padding:12px 16px;background:rgba(255,255,255,0.03);border-radius:10px}
.gantt-legend-item{display:flex;align-items:center;gap:7px;font-size:0.8rem;color:var(--muted)}
.gantt-legend-dot{width:14px;height:10px;border-radius:3px;flex-shrink:0}
.gantt-axis{position:relative;height:28px;margin-right:220px;margin-bottom:4px;border-bottom:1px solid var(--border)}
.gt-axis-label{position:absolute;font-size:0.68rem;color:var(--muted);transform:translateX(50%);bottom:4px;white-space:nowrap}
.gantt-proj-block{margin-bottom:14px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.gantt-proj-toggle{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;background:rgba(255,255,255,0.03);user-select:none}
.gantt-proj-toggle:hover{background:rgba(255,255,255,0.05)}
.gt-toggle-icon{color:var(--muted);font-size:0.8rem;transition:transform 0.3s}
.gantt-proj-body{overflow-x:auto;background:rgba(0,0,0,0.15)}
.gt-inner{min-width:600px;padding:8px 0}
.gt-row{display:flex;align-items:center;padding:3px 12px;min-height:36px}
.gt-row:hover{background:rgba(255,255,255,0.02)}
.gt-label{width:220px;flex-shrink:0;padding-left:8px}
.gt-label-name{font-size:0.78rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gt-label-meta{font-size:0.68rem;color:var(--muted);margin-top:2px}
.gt-track{flex:1;height:24px;background:rgba(255,255,255,0.03);border-radius:6px;position:relative;margin:0 4px}
.gt-bar{position:absolute;height:100%;border-radius:6px;min-width:4px;cursor:pointer;display:flex;align-items:center;overflow:hidden;transition:filter 0.2s}
.gt-bar:hover{filter:brightness(1.25);z-index:10}
.gt-bar-label{font-size:0.65rem;color:rgba(0,0,0,0.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 6px;font-weight:bold}
.team-card{background:var(--card);border-radius:14px;margin-bottom:12px;overflow:hidden;border:1px solid var(--border)}
.team-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;user-select:none}
.team-header:hover{background:rgba(255,255,255,0.02)}
.team-title{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.team-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.team-badge{background:rgba(255,255,255,0.07);color:var(--muted);padding:2px 10px;border-radius:20px;font-size:0.75rem}
.team-stats{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.stat-pill{padding:3px 10px;border-radius:20px;font-size:0.75rem}
.stat-pill.green{background:rgba(52,211,153,0.1);color:#34d399}
.stat-pill.orange{background:rgba(251,191,36,0.1);color:#fbbf24}
.stat-pill.red{background:rgba(248,113,113,0.1);color:#f87171}
.stat-pill.blue{background:rgba(56,189,248,0.1);color:var(--blue)}
.toggle-icon{color:var(--muted);font-size:0.75rem;transition:transform 0.3s}
.bar-mini{height:3px;background:rgba(255,255,255,0.04)}
.team-body{padding:0 18px 18px}
table{width:100%;border-collapse:collapse;font-size:0.8rem;margin-top:12px}
th{color:var(--muted);font-weight:normal;padding:8px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
td{padding:8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.015)}
.footer{text-align:center;color:var(--muted);font-size:0.75rem;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
</style>

function isDone(status) {
  if (!status) return false;
  const text = status.toString().trim().toLowerCase();
  return ['انجام شده', 'done', 'completed', 'complete'].includes(text);
}
function isInProgress(status) {
  if (!status) return false;
  const text = status.toString().trim().toLowerCase();
  return ['درحال انجام', 'in progress', 'progress', 'doing', 'started'].includes(text);
}
function isStopped(status) {
  if (!status) return false;
  const text = status.toString().trim().toLowerCase();
  return ['متوقف شده', 'stopped', 'blocked', 'cancelled', 'canceled'].includes(text);
}
function isBug(label) {
  if (!label) return false;
  const t = label.toString().trim().toLowerCase();
  return ['bug', 'bugs', '🐛 bug', 'buggy'].includes(t) || t.includes('bug');
}
function parseDate(value) {
  if (!value || value === '-') return null;
  if (typeof value === 'string') {
    const fixed = value.trim();
    const match = fixed.match(/^(\d{3,4})\D?(\d{1,2})\D?(\d{1,2})$/);
    if (match) {
      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);
      return { year, month, day, original: fixed };
    }
  }
  return null;
}
function dateToOffset(date) {
  if (!date) return 0;
  const year = date.year;
  const month = date.month;
  const day = date.day;
  const monthLengths = [31,31,31,31,31,31,30,30,30,30,30,29];
  let days = (year - 1300) * 365;
  days += Math.floor((year - 1300) / 4);
  for (let i = 1; i < month; i++) {
    days += monthLengths[i - 1] || 30;
  }
  days += day;
  return days;
}
function getTaskRange(tasks) {
  const dates = new Set();
  tasks.forEach(task => {
    ['startAt','endAt','dueAt'].forEach(key => {
      const date = parseDate(task[key]);
      if (date) dates.add(date.original);

  });
  const sorted = Array.from(dates).sort();
  return sorted;
}

  const normalized = {};

  const bugOpen = bugTasks.filter(t => !isDone(t.statusLabel)).length;
  const bugDone = bugCount - bugOpen;
  const bugRatio = total ? ((bugCount / total) * 100).toFixed(1) : '0.0';
  document.getElementById('task-count').textContent = `🔢 ${total} تسک در این اسپرینت`;
  const reportRange = tasks.reduce((range, task) => {
    const start = parseDate(task.startAt);
    const end = parseDate(task.endAt);
    if (!start && !end) return range;
    const values = [start, end].filter(Boolean);
    const dates = values.map(d => d.original);
    range.push(...dates);
    return range;
  }, []);
  const uniqueSorted = Array.from(new Set(reportRange)).sort();
  const headerRange = uniqueSorted.length ? `${uniqueSorted[0]} تا ${uniqueSorted[uniqueSorted.length - 1]}` : 'بدون تاریخ';
  document.querySelector('#report-range strong').textContent = headerRange;
  document.getElementById('footer').textContent = `گزارش تولید شده توسط n8n automation — ${headerRange}`;
  const labels = [
    {num: done, label: '✅ انجام شده', color: 'green'},
    {num: inProgress, label: '🔄 در حال انجام', color: 'orange'},
    {num: stopped, label: '🚫 متوقف شده', color: 'red'},
    {num: `${totalHours.toFixed(1).replace(/\.0$/, '')}h`, label: '⏱ کل ساعت کار', color: 'blue'},
    {num: `${bugRatio}%`, label: '🐛 نسبت باگ', color: 'purple'},
  ];
  document.getElementById('kpi-row').innerHTML = labels.map(item => `
    <div class="kpi ${item.color}"><div class="num">${item.num}</div><div class="label">${item.label}</div></div>
  `).join('');
  const hoursByProject = {};
  tasks.forEach(task => {
    const hours = task.actualHours || 0;
    hoursByProject[task.project] = (hoursByProject[task.project] || 0) + hours;
  });
  const projectItems = Object.entries(hoursByProject).sort((a,b) => b[1] - a[1]);
  const maxHours = projectItems[0] ? projectItems[0][1] : 1;
  document.getElementById('project-hours').innerHTML = projectItems.map(([project,hours]) => {
    const ratio = maxHours ? (hours / maxHours) * 100 : 0;
    const color = project.includes('AI') ? '#a78bfa' : project.includes('Logistic') ? '#38bdf8' : project.includes('Store') ? '#f472b6' : project.includes('Dev') ? '#fb923c' : '#34d399';
    return `
      <div class="bar-wrapper">
        <div class="bar-info"><span style="color:#fff;font-weight:500">${project}</span><span style="color:${color};font-weight:bold">${hours.toFixed(1).replace(/\.0$/, '')}h</span></div>
        <div class="bar-container"><div class="bar-fill" style="width:${ratio}%;background:linear-gradient(90deg,${color}99,${color})"></div></div>
      </div>
    `;
  }).join('') || '<div style="color:var(--muted)">داده‌ای برای نمودار پروژه وجود ندارد.</div>';
  const labelCounts = {};
  tasks.forEach(task => {
    const label = task.label || 'بدون برچسب';
    labelCounts[label] = (labelCounts[label] || 0) + 1;
  });
  const labelsHtml = Object.entries(labelCounts).sort((a,b)=>b[1]-a[1]).map(([label,count]) => `
    <div class="bug-stat-row"><span style="color:var(--muted)">${label}</span><span style="color:#fff;font-weight:bold">${count}</span></div>
  `).join('');
  document.getElementById('bug-section').innerHTML = `
    <div class="bug-card">
      <div class="section-title">🐛 آنالیز باگ‌ها</div>
      <div class="donut-wrap">
        <div class="donut"><span class="donut-num">${bugRatio}%</span></div>
        <div class="bug-stats">
          <div class="bug-stat-row"><span>کل باگ‌ها</span><span style="color:#f87171;font-weight:bold">${bugCount}</span></div>
          <div class="bug-stat-row"><span>کل تسک‌ها</span><span style="color:#fff">${total}</span></div>
          <div class="bug-stat-row"><span>باگ‌های حل‌شده</span><span style="color:#34d399">${bugDone}</span></div>
          <div class="bug-stat-row"><span>باگ‌های باز</span><span style="color:#fbbf24">${bugOpen}</span></div>
        </div>
      </div>
    </div>
    <div class="bug-card">
      <div class="section-title">🏷 توزیع برچسب‌ها</div>
      ${labelsHtml}
    </div>
  `;
  const projectGroups = {};
  tasks.forEach(task => {
    projectGroups[task.project] = projectGroups[task.project] || [];
    projectGroups[task.project].push(task);
  });
  const projects = Object.entries(projectGroups).sort((a,b) => {
    const sumA = a[1].reduce((sum,t)=>sum+(t.actualHours||0),0);
    const sumB = b[1].reduce((sum,t)=>sum+(t.actualHours||0),0);
    return sumB - sumA;
  });
  const ganttRange = getTaskRange(tasks);
  const ganttMin = ganttRange[0];
  const ganttMax = ganttRange[ganttRange.length - 1];
  const ganttMinDate = parseDate(ganttMin);
  const ganttMaxDate = parseDate(ganttMax);
  const minOffset = dateToOffset(ganttMinDate);
  const maxOffset = dateToOffset(ganttMaxDate);
  const totalSpan = Math.max(1, maxOffset - minOffset);
  const axisLabels = ganttRange.map(date => `
    <div class="gt-axis-label" style="left:${((dateToOffset(parseDate(date)) - minOffset) / totalSpan) * 100}%">${date}</div>
  `).join('');
  const ganttHtml = projects.map(([project,tasks], index) => {
    const taskRows = tasks.map(task => {
      const start = parseDate(task.startAt);
      const end = parseDate(task.endAt);
      const startOffset = start ? dateToOffset(start) : minOffset;
      const endOffset = end ? dateToOffset(end) : startOffset + 1;
      const left = ((startOffset - minOffset) / totalSpan) * 100;
      const width = ((Math.max(endOffset, startOffset + 1) - startOffset) / totalSpan) * 100;
      const statusColor = isDone(task.statusLabel) ? '#34d399' : isStopped(task.statusLabel) ? '#f87171' : '#475569';
      return `
        <div class="gt-row">
          <div class="gt-label" title="${task.task}">
            <div class="gt-label-name">${task.task}</div>
            <div class="gt-label-meta">${task.assignee} · ${task.startAt}</div>
          </div>
          <div class="gt-track">
            <div style="position:absolute;top:0;bottom:0;left:${left}%;width:2px;background:rgba(248,113,113,0.5);pointer-events:none"></div>
            <div class="gt-bar" style="left:${left}%;width:${width}%;background:${statusColor}"
                 title="${task.task}
${task.startAt} → ${task.endAt}
مهلت: ${task.dueAt}
وضعیت: ${task.statusLabel}">
              <span class="gt-bar-label">${task.task}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');
    const color = index === 0 ? '#38bdf8' : index === 1 ? '#a78bfa' : index === 2 ? '#34d399' : index === 3 ? '#fb923c' : '#f472b6';
    return `
      <div class="gantt-proj-block">
        <div class="gantt-proj-toggle" onclick="toggleGantt(${index})" style="border-right:4px solid ${color}">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="color:${color};font-weight:bold">${project}</span>
            <span style="background:rgba(255,255,255,0.07);color:#94a3b8;padding:2px 10px;border-radius:20px;font-size:0.75rem">${tasks.length} تسک</span>
          </div>
          <span class="gt-toggle-icon" id="gicon-${index}">▼</span>
        </div>
        <div class="gantt-proj-body" id="gbody-${index}" style="display:none">
          <div class="gt-inner">${taskRows}</div>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('gantt-card').innerHTML = `
    <div class="gantt-legend">
      <div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#34d399"></div>به موقع تحویل داده شد</div>
      <div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#f87171"></div>دیرتر از مهلت انجام</div>
      <div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#fbbf24"></div>متوقف شده</div>
      <div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#475569"></div>در حال انجام</div>
    </div>
    <div class="gantt-axis">${axisLabels}</div>
    ${ganttHtml}
  `;
  const teamCards = projects.map(([project,tasks], index) => {
    const projectColor = index === 0 ? '#38bdf8' : index === 1 ? '#a78bfa' : index === 2 ? '#34d399' : index === 3 ? '#fb923c' : '#f472b6';
    const totalHours = tasks.reduce((sum,t)=>sum+(t.actualHours||0),0);
    const doneCount = tasks.filter(t => isDone(t.statusLabel)).length;
    const inProgressCount = tasks.filter(t => isInProgress(t.statusLabel)).length;
    const bugCount = tasks.filter(t => isBug(t.label)).length;
    const rowsHtml = tasks.sort((a,b)=> (b.actualHours||0) - (a.actualHours||0)).map(task => `
      <tr>
        <td>${task.task}${isBug(task.label) ? '<span style="background:rgba(248,113,113,0.15);color:#f87171;padding:2px 7px;border-radius:10px;font-size:0.72rem;margin-right:4px">🐛 Bug</span>' : ''}</td>
        <td><span style="color:${task.team.includes('UI') ? '#f472b6' : task.team.includes('back') || task.team.includes('بک') ? '#38bdf8' : task.team.includes('فلاتر') ? '#a78bfa' : '#34d399'}">${task.team}</span></td>
        <td>${task.assignee}</td>
        <td>${task.startAt}</td>
        <td>${task.endAt}</td>
        <td>${task.actualHours == null ? '-' : task.actualHours.toFixed(1).replace(/\.0$/, '')}</td>
        <td><span style="background:${isDone(task.statusLabel)?'rgba(52,211,153,0.1)':isInProgress(task.statusLabel)?'rgba(251,191,36,0.1)':'rgba(248,113,113,0.1)'};color:${isDone(task.statusLabel)?'#34d399':isInProgress(task.statusLabel)?'#fbbf24':'#f87171'};padding:3px 10px;border-radius:20px;font-size:0.75rem">${task.statusLabel}</span></td>
      </tr>
    `).join('');
    return `
      <div class="team-card" style="border-right:4px solid ${projectColor}">
        <div class="team-header" onclick="toggle(${index})">
          <div class="team-title">
            <span class="team-dot" style="background:${projectColor}"></span>
            <strong style="font-size:1rem">${project}</strong>
            <span class="team-badge">${tasks.length} تسک</span>
            ${bugCount ? `<span class="stat-pill" style="background:rgba(248,113,113,0.1);color:#f87171">${bugCount} 🐛</span>` : ''}
          </div>
          <div class="team-stats">
            <span class="stat-pill green">${doneCount} ✅</span>
            <span class="stat-pill orange">${inProgressCount} 🔄</span>
            <span class="stat-pill blue">${totalHours.toFixed(1).replace(/\.0$/, '')}h</span>
            <span class="toggle-icon" id="icon-${index}">▼</span>
          </div>
        </div>
        <div class="bar-mini"><div style="height:100%;width:${Math.min(100, maxHours ? (totalHours / maxHours) * 100 : 0)}%;background:${projectColor}"></div></div>
        <div class="team-body" id="body-${index}" style="display:none">
          <table>
            <thead><tr><th>وظیفه</th><th>تیم</th><th>مسئول</th><th>شروع</th><th>پایان</th><th>ساعت</th><th>وضعیت</th></tr></thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('team-cards').innerHTML = teamCards;
}
function toggle(idx) {
  const body = document.getElementById('body-' + idx);
  const icon = document.getElementById('icon-' + idx);
  if (!body) return;
  if (body.style.display === 'none') { body.style.display = 'block'; icon.style.transform = 'rotate(180deg)'; }
  else { body.style.display = 'none'; icon.style.transform = 'rotate(0)'; }
}
function toggleGantt(idx) {
  const body = document.getElementById('gbody-' + idx);
  const icon = document.getElementById('gicon-' + idx);
  if (!body) return;
  if (body.style.display === 'none') { body.style.display = 'block'; icon.style.transform = 'rotate(180deg)'; }
  else { body.style.display = 'none'; icon.style.transform = 'rotate(0)'; }
}
render();
</script>
</body>
</html>
